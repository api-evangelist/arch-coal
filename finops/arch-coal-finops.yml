principles:
- name: Visibility
  description: Because the provider does not publish a usage API or self-serve billing dashboard, request
    invoice copies and contract usage exports directly from the account team and load them into your own
    FinOps tooling.
- name: Allocation
  description: Allocate spend by tagging invoice line items to consuming business units in your ERP /
    FinOps store; no provider-side tagging surface is available.
- name: Optimization
  description: Optimization levers are commercial — renegotiate volume commitments, consolidate accounts,
    or align contract scope with actual usage at renewal.
- name: Accountability
  description: Assign a contract owner who reviews invoices against the negotiated agreement, since usage
    drift cannot be detected from a published meter feed.
