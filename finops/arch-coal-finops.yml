description: FOCUS-aligned FinOps placeholder for Arch Coal. No public billing-model details, meters,
  or invoice schema are published; this artifact records the absence so consumers know to source commercial
  terms from the provider directly.
notes: Arch Coal (now Arch Resources) does not operate a commercial API program. Investor-relations data
  is published as filings and reports rather than through a paid API.
